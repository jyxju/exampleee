<!doctype html>
<html>
  <head>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: #0a0a1a;
      }
      canvas {
        display: block;
      }
      #info {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        color: rgba(255, 255, 255, 0.5);
        font-family: Arial, sans-serif;
        font-size: 14px;
        text-align: center;
        pointer-events: none;
        user-select: none;
      }
    </style>
  </head>
  <body>
    <div id="info">drag to rotate scroll to zoom</div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
          "gsap": "https://unpkg.com/gsap@3.12.2/index.js"
        }
      }
    </script>

    <script type="module">
      import * as THREE from 'three';
      import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
      import gsap from 'gsap';

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0xf2f0e6);

      const camera = new THREE.PerspectiveCamera(
        30,
        window.innerWidth / window.innerHeight,
        0.01,
        50,
      );
      camera.position.set(0, 0, 20);
      camera.lookAt(0, 0, 0);

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      document.body.appendChild(renderer.domElement);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.08;
      controls.minDistance = 10;
      controls.maxDistance = 30;
      controls.target.set(0, 0, 0);

      let targetDistance = camera.position.length();
      let currentDistance = targetDistance;

      controls.enableZoom = false;

      renderer.domElement.addEventListener('wheel', (event) => {
        event.preventDefault();

        const zoomSpeed = 0.8;
        const delta = event.deltaY > 0 ? 1 : -1;
        let newDistance = targetDistance + delta * zoomSpeed;

        newDistance = Math.max(
          controls.minDistance,
          Math.min(controls.maxDistance, newDistance),
        );

        if (newDistance !== targetDistance) {
          targetDistance = newDistance;
        }
      });

      const products = [[-1, -3, 2]];
      const loader = new THREE.TextureLoader();

      const squares = [];
      const size = 3;

      for (let i = 0; i < products.length; i++) {
        const texture = loader.load('товар.png');
        const group = new THREE.Group();

        // Основная плоскость
        const geometry = new THREE.PlaneGeometry(size, size);
        const material = new THREE.MeshStandardMaterial({
          map: texture,
          side: THREE.DoubleSide,
          //   transparent: true,
        });
        const plane = new THREE.Mesh(geometry, material);
        group.add(plane);

        group.position.set(products[i][0], products[i][1], products[i][2]);

        scene.add(group);
      }

      // --- 7. АНИМАЦИЯ ---
      function animate() {
        requestAnimationFrame(animate);
        currentDistance += (targetDistance - currentDistance) * 0.07;
        const direction = camera.position.clone().normalize();
        camera.position.copy(direction.multiplyScalar(currentDistance));

        controls.update();
        renderer.render(scene, camera);
      }

      animate();

      // --- 8. АДАПТАЦИЯ ПОД РАЗМЕР ОКНА ---
      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    </script>
  </body>
</html>
